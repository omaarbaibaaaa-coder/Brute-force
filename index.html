<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brute Force Text Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    margin:20px;
}
textarea{
    width:100%;
    height:350px;
    background:#111;
    color:#0f0;
    padding:10px;
}
input,button{
    padding:10px;
    margin:5px;
}
</style>

</head>
<body>

<h2>Brute Force Text Generator</h2>

Characters:
<input id="chars" value="abcdefghijklmnopqrstuvwxyz">

Max Words:
<input id="maxWords" type="number" value="1000">

<button onclick="start()">Generate</button>
<button onclick="stop()">Stop</button>

<br><br>

Find:
<input id="findText">
<button onclick="findText()">Find</button>

<br><br>

<textarea id="output"></textarea>

<script>

let running=false;

function start(){

running=true;

const chars=document.getElementById("chars").value;
const limit=parseInt(document.getElementById("maxWords").value);

const output=document.getElementById("output");
output.value="";

let generated=0;

function generate(prefix){

if(!running)return;

if(generated>=limit)return;

if(prefix.length>0){
output.value+=prefix+" ";
generated++;
}

for(let c of chars){

if(!running)return;

if(generated>=limit)return;

generate(prefix+c);

}

}

generate("");

}

function stop(){
running=false;
}

function findText(){

const text=document.getElementById("findText").value;

const area=document.getElementById("output");

const pos=area.value.indexOf(text);

if(pos==-1){

alert("Not Found");

}else{

area.focus();
area.setSelectionRange(pos,pos+text.length);

alert("Found at character "+pos);

}

}

</script>

</body>
</html>
